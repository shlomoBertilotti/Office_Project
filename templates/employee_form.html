{% extends "base.html" %}

{% block content %}

<div class="page-title">
    <h2>{% if employee %}Edit Employee{% else %}Add Employee{% endif %}</h2>
    <a class="secondary-button" href="/employees">Back to Employees</a>
</div>

<form method="post" class="form-card">
    <label>Name</label>
    <input type="text" name="name" value="{{ employee.name if employee else '' }}" required>

    <label>Department</label>
    <input type="text" name="department" value="{{ employee.department if employee else '' }}" required>

    <label>Hire Date</label>
    <input type="date" name="hire_date" value="{{ employee.hire_date if employee else '' }}" required>

    <label>Salary</label>
    <input type="number" step="0.01" name="salary" value="{{ employee.salary if employee else '' }}" required>

    <label>Office</label>
    <select name="office_id">
        <option value="">No Office</option>
        {% for office in offices %}
        <option value="{{ office.id }}"
            {% if employee and employee.office_id == office.id %}selected{% endif %}>
            Floor {{ office.floor }}, Room {{ office.room_number }}
        </option>
        {% endfor %}
    </select>

    <button type="submit" class="primary-button">Save</button>
</form>

{% endblock %}
